# Publishes the sdist/wheel to PyPI when a GitHub Release is published.
#
# Bump `version` in pyproject.toml to match the release; PyPI rejects duplicate
# versions. `skip-existing: true` avoids a hard failure if that version was
# already uploaded.
#
# One-time PyPI setup (trusted publishing, no GitHub Environment):
# 1. PyPI → project → Settings → Publishing → remove any publisher that lists
#    Environment name "pypi", then add a new pending publisher with Environment
#    left blank (must match this workflow: no `environment:` on the job).
# 2. Provider: GitHub, repo: <owner>/hudu-magic, workflow: publish-pypi.yml
# 3. After the first successful run, the publisher is activated.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build
        run: python -m pip install -U pip build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
